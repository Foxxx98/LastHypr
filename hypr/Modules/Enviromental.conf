# ╔══════════════════════════════════════════════════════════════════╗
# ║  conf/env.conf                                                  ║
# ║  Variables de entorno — todas en un solo lugar.                ║
# ║  NOTA: en tu config original tenías QT_QPA_PLATFROMTHEME       ║
# ║  (typo: PLATFROM en vez de PLATFORM). Corregido aquí.          ║
# ║  También tenías QT_QPA_PLATFORMTHEME duplicado (línea 72/322). ║
# ╚══════════════════════════════════════════════════════════════════╝
# Documentación: https://wiki.hypr.land/Configuring/Environment-variables/

# ── Cursor ────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ── NVIDIA ────────────────────────────────────────────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# Necesario para allow_tearing = true con NVIDIA en Wayland
env = __GL_GSYNC_ALLOWED,1

# ── Qt ────────────────────────────────────────────────────────────
env = QT_QPA_PLATFORM,wayland;xcb          # wayland primero, xcb como fallback
env = QT_QPA_PLATFORMTHEME,kvantum          # qt6ct para Qt6, qt5ct para Qt5 legacy
env = QT_STYLE_OVERRIDE,kvantum
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# ── Wayland / XDG ─────────────────────────────────────────────────
env = GDK_BACKEND,wayland,x1,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
