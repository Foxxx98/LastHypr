# ╔══════════════════════════════════════════════════════════════════╗
# ║  conf/windowrules.conf                                          ║
# ║  Sintaxis nueva Hyprland (post windowrulev2 deprecation)        ║
# ║  Ref: https://wiki.hypr.land/Configuring/Window-Rules/         ║
# ╚══════════════════════════════════════════════════════════════════╝

# ── Opaque + no shadow ────────────────────────────────────────────
# Navegadores, reproductores y juegos no necesitan blur ni sombra
windowrule = opaque on, no_shadow on, match:class ^(firefox|waterfox|zen|helium|mpv|scrcpy|steam_proton)$

# Juegos — solo en fullscreen real (fullscreen_state 3)
windowrule = opaque on, no_shadow on, fullscreen_state 3, match:class ^(Minecraft 1\.12\.2)$

# Waydroid / Android
windowrule = opaque on, no_shadow on, match:class ^(waydroid\.com\.YoStarEN\.AzurLane|Azur Lane)$

# ── Terminales — blur + transparencia ────────────────────────────
# blur activado, opacidad 80% activa e inactiva
windowrulev = opacity 0.75 0.75,class:^(Alacritty|kitty)$

# ── Apps semi-transparentes ───────────────────────────────────────
# 80% activo, 75% inactivo (más sutil que el override total)
windowrule = opacity 0.80 override 0.75, match:class ^(thunar|spotify|vesktop|steam|Rofi|swaync|better_control\.py)$

windowrule = opacity 0.8 override 0.7, match:class ^(swaync|rofi)$


windowrule = match:class Waydroid.*, float on, center on, size 432 240
windowrule = opaque on, match:class ^(steam_app_1551360)$
