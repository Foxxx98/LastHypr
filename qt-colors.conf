# ~/.config/matugen/templates/qt-colors.conf
#
# qt5ct / qt6ct color scheme file.
# Order of the 20 values = QPalette::ColorRole enum:
# WindowText, Button, Light, Midlight, Dark, Mid, Text, BrightText,
# ButtonText, Base, Window, Shadow, Highlight, HighlightedText,
# Link, LinkVisited, AlternateBase, NoRole, ToolTipBase, ToolTipText

[ColorScheme]
active_colors={{ colors.on_background.default.hex }}, {{ colors.surface_container_high.default.hex }}, {{ colors.surface_bright.default.hex }}, {{ colors.surface_container_highest.default.hex }}, {{ colors.surface_dim.default.hex }}, {{ colors.surface_container.default.hex }}, {{ colors.on_surface.default.hex }}, {{ colors.inverse_on_surface.default.hex }}, {{ colors.on_surface.default.hex }}, {{ colors.surface_container_low.default.hex }}, {{ colors.background.default.hex }}, {{ colors.shadow.default.hex }}, {{ colors.primary.default.hex }}, {{ colors.on_primary.default.hex }}, {{ colors.primary.default.hex }}, {{ colors.secondary.default.hex }}, {{ colors.surface_container.default.hex }}, #000000, {{ colors.surface_container_highest.default.hex }}, {{ colors.on_surface.default.hex }}

inactive_colors={{ colors.on_background.default.hex }}, {{ colors.surface_container_high.default.hex }}, {{ colors.surface_bright.default.hex }}, {{ colors.surface_container_highest.default.hex }}, {{ colors.surface_dim.default.hex }}, {{ colors.surface_container.default.hex }}, {{ colors.on_surface.default.hex }}, {{ colors.inverse_on_surface.default.hex }}, {{ colors.on_surface.default.hex }}, {{ colors.surface_container_low.default.hex }}, {{ colors.background.default.hex }}, {{ colors.shadow.default.hex }}, {{ colors.secondary.default.hex }}, {{ colors.on_secondary.default.hex }}, {{ colors.primary.default.hex }}, {{ colors.secondary.default.hex }}, {{ colors.surface_container.default.hex }}, #000000, {{ colors.surface_container_highest.default.hex }}, {{ colors.on_surface.default.hex }}

disabled_colors={{ colors.on_surface_variant.default.hex }}, {{ colors.surface_container_high.default.hex }}, {{ colors.surface_bright.default.hex }}, {{ colors.surface_container_highest.default.hex }}, {{ colors.surface_dim.default.hex }}, {{ colors.surface_container.default.hex }}, {{ colors.on_surface_variant.default.hex }}, {{ colors.inverse_on_surface.default.hex }}, {{ colors.on_surface_variant.default.hex }}, {{ colors.surface_container_low.default.hex }}, {{ colors.background.default.hex }}, {{ colors.shadow.default.hex }}, {{ colors.surface_container.default.hex }}, {{ colors.on_surface_variant.default.hex }}, {{ colors.primary.default.hex }}, {{ colors.secondary.default.hex }}, {{ colors.surface_container.default.hex }}, #000000, {{ colors.surface_container_highest.default.hex }}, {{ colors.on_surface_variant.default.hex }}
